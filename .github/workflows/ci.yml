name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: cargo test

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: cargo build

  coverage:
    name: Coverage (100% lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - uses: taiki-e/install-action@v2 # renovate: pin digest
        with:
          tool: cargo-llvm-cov
      # The library's I/O is generic over the reader, so each error closure is
      # monomorphized per reader type — making cargo-llvm-cov's region/function
      # metrics structurally < 100%. The meaningful, monomorphization-robust
      # invariant is that every executable source line is hit at least once;
      # this gate fails if lcov records any zero-hit line.
      - name: Generate lcov
        run: cargo llvm-cov --lib --lcov --output-path lcov.info
      - name: Enforce 100% line coverage
        run: |
          if grep -qE '^DA:[0-9]+,0$' lcov.info; then
            echo "::error::Uncovered lines found:"
            awk -F: '/^SF:/{f=$2} /^DA:[0-9]+,0$/{split($2,a,","); print f":"a[1]}' lcov.info
            exit 1
          fi
          echo "All executable lines covered."

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@v2 # renovate: pin digest
        with:
          command: check

  fuzz:
    name: Fuzz targets (nightly)
    runs-on: ubuntu-latest
    # cargo-fuzz builds with the host nightly; warnings in its own deps must not
    # fail the install, so this job does not deny warnings.
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: cargo install cargo-fuzz
      - name: Build all fuzz targets
        run: cargo +nightly fuzz check
      - name: Smoke-fuzz each target (30s)
        run: |
          for t in boot record attributes runlist index_buffer compress attribute_list; do
            cargo +nightly fuzz run "$t" -- -max_total_time=30 -rss_limit_mb=4096
          done

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps
