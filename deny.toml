# cargo-deny configuration — supply-chain and licence gate.
[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"
# RUSTSEC-2021-0153: `encoding` is unmaintained. It enters the graph ONLY via the
# `mft` dev-dependency (the cross-validation oracle in tests/parity_mft.rs) and is
# never part of the published crate. Dev-only, not shipped.
ignore = ["RUSTSEC-2021-0153"]

[licenses]
version = 2
# This crate is MIT; permit only permissive, non-copyleft licences in the tree.
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "Unicode-3.0", "ISC", "Zlib"]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
